<h2>Requests</h2>
<a href="{% url 'request_create' %}">Create New Request</a>

<table border="1">
<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Status</th>
    <th>Actions</th>
</tr>
{% for r in requests %}
<tr>
    <td>{{ r.id }}</td>
    <td>{{ r.title }}</td>
    <td>{{ r.status }}</td>
    <td>
        <a href="{% url 'request_edit' r.id %}">Edit</a> |
        <a href="{% url 'request_delete' r.id %}">Delete</a>
    </td>
</tr>
{% empty %}
<tr><td colspan="4">No data found</td></tr>
{% endfor %}
</table>
